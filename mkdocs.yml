site_name: OJS-Scrape
site_description: Coleta estruturada de metadados e PDFs públicos de periódicos OJS via OAI-PMH
site_url: https://ericbrasil.com.br/ojs-scrape
repo_url: https://github.com/ericbrasiln/ojs-scrape
repo_name: ericbrasiln/ojs-scrape
edit_uri: edit/main/docs/

copyright: Copyright &copy; Eric Brasil Nepomuceno

theme:
  name: material
  language: pt-BR
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

plugins:
  - search:
      lang: pt
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Início: index.md
  - Instalação: installation.md
  - Uso:
      - Visão geral: usage.md
      - CLI: cli.md
      - PDFs: pdfs.md
  - Referência:
      - API Python: api.md
      - Citação: citation.md
      - Design rationale: design-rationale.md
  - Compatibilidade: compatibility.md
  - Créditos e transparência: credits-transparency.md
  - Desenvolvimento:
      - Guia de desenvolvimento: development.md
      - Roadmap: roadmap.md
